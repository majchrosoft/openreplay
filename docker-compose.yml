version: '3.8'

services:
  openreplay:
    build: .
    ports:
      - "8000:8000"
    environment:
      - YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID}
      - YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET}
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./tokens:/app/tokens
      - ./workspace:/app/workspace

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
